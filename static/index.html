<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Base</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --card: #161b22;
  --card-hover: #1c2129;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --text-bright: #f0f6fc;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --blue: #388bfd;
  --red: #f85149;
  --sky: #56d4dd;
  --amber: #d29922;
  --green: #3fb950;
  --orange: #db6d28;
  --radius: 8px;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== TOP BAR ===== */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-brand {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-bright);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-brand svg { width: 22px; height: 22px; }
.stats-strip {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-muted);
  font-family: var(--mono);
  flex-shrink: 0;
}
.stats-strip span { white-space: nowrap; }
.stats-strip .stat-val { color: var(--text); font-weight: 600; }
.search-area {
  margin-left: auto;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.search-area input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px;
  color: var(--text);
  font-size: 14px;
  width: 260px;
  outline: none;
  transition: border-color 0.2s;
}
.search-area input:focus { border-color: var(--accent); }
.search-area input::placeholder { color: var(--text-muted); }
.btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 14px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: var(--sans);
}
.btn:hover { background: var(--card-hover); border-color: var(--text-muted); }
.btn-accent {
  background: rgba(56,139,253,0.15);
  border-color: rgba(56,139,253,0.4);
  color: var(--accent);
}
.btn-accent:hover { background: rgba(56,139,253,0.25); }

/* ===== NAV TABS ===== */
.nav-tabs {
  display: flex;
  gap: 0;
  padding: 0 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.nav-tab {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  user-select: none;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--text-bright); border-bottom-color: var(--accent); }

/* ===== CONTENT ===== */
.content { padding: 20px; max-width: 1200px; margin: 0 auto; }

/* Filter pills */
.filter-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.pill {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  transition: all 0.15s;
  font-family: var(--sans);
}
.pill:hover { border-color: var(--text-muted); color: var(--text); }
.pill.active { background: rgba(56,139,253,0.15); border-color: rgba(56,139,253,0.4); color: var(--accent); }

/* ===== TOPIC GRID ===== */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.topic-card:hover { background: var(--card-hover); border-color: var(--text-muted); transform: translateY(-1px); }
.topic-card h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 8px;
}
.topic-meta {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
}
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  text-transform: uppercase;
}
.badge-stale { background: rgba(210,153,34,0.15); color: var(--amber); }
.badge-article { background: rgba(56,139,253,0.15); color: var(--blue); }
.badge-youtube { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-tweet { background: rgba(86,212,221,0.15); color: var(--sky); }
.badge-quote { background: rgba(210,153,34,0.15); color: var(--amber); }

/* ===== SOURCE LIST ===== */
.source-list { display: flex; flex-direction: column; gap: 4px; }
.source-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
}
.source-row:hover { background: var(--card-hover); border-color: var(--text-muted); }
.source-title {
  flex: 1;
  font-size: 14px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.source-date {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
  white-space: nowrap;
}
.enrichment-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.enrichment-dot.complete { background: var(--green); }
.enrichment-dot.pending { background: var(--amber); }
.enrichment-dot.failed { background: var(--red); }
.enrichment-dot.enriching { background: var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ===== DETAIL PANEL ===== */
.detail-panel {
  position: fixed;
  top: 0; right: 0;
  width: min(680px, 100vw);
  height: 100vh;
  background: var(--bg);
  border-left: 1px solid var(--border);
  z-index: 200;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  padding: 0;
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  position: sticky;
  top: 0;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
}
.detail-header h2 {
  flex: 1;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-bright);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.detail-close {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
  background: none; border: none; font-size: 18px;
}
.detail-close:hover { background: var(--card-hover); color: var(--text); }
.detail-body { padding: 20px; }

/* Wiki content rendered markdown */
.wiki-content {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
}
.wiki-content h1, .wiki-content h2, .wiki-content h3 {
  color: var(--text-bright);
  margin-top: 24px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.wiki-content h1 { font-size: 22px; }
.wiki-content h2 { font-size: 18px; }
.wiki-content h3 { font-size: 16px; border-bottom: none; }
.wiki-content p { margin-bottom: 12px; }
.wiki-content ul, .wiki-content ol { padding-left: 24px; margin-bottom: 12px; }
.wiki-content li { margin-bottom: 4px; }
.wiki-content code {
  font-family: var(--mono);
  background: rgba(110,118,129,0.15);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
}
.wiki-content pre {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  overflow-x: auto;
  margin-bottom: 12px;
}
.wiki-content pre code { background: none; padding: 0; }
.wiki-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 16px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.wiki-content a { color: var(--accent); text-decoration: none; }
.wiki-content a:hover { text-decoration: underline; }

/* Source detail sections */
.detail-section { margin-bottom: 20px; }
.detail-section-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.detail-section p { font-size: 14px; line-height: 1.6; }
.insight-list { list-style: none; padding: 0; }
.insight-list li {
  padding: 6px 0;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.insight-list li:last-child { border-bottom: none; }
.entity-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.entity-tag {
  padding: 3px 10px;
  background: rgba(110,118,129,0.1);
  border: 1px solid var(--border);
  border-radius: 16px;
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text-muted);
}
.linked-sources { display: flex; flex-direction: column; gap: 6px; }
.linked-source {
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
}
.linked-source .ls-title { color: var(--text); font-weight: 500; }
.linked-source .ls-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

/* Pipeline status */
.pipeline { display: flex; flex-direction: column; gap: 6px; }
.pipeline-stage {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-family: var(--mono);
}
.pipeline-stage .stage-name { width: 100px; color: var(--text-muted); }
.pipeline-stage .stage-status { font-weight: 600; }
.pipeline-stage .stage-status.complete { color: var(--green); }
.pipeline-stage .stage-status.pending { color: var(--amber); }
.pipeline-stage .stage-status.failed { color: var(--red); }
.pipeline-stage .stage-status.running { color: var(--accent); }

/* ===== AI ANSWER MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: min(600px, 100%);
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
}
.modal h3 {
  font-size: 16px;
  color: var(--text-bright);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal .answer-text { font-size: 14px; line-height: 1.7; }
.modal .answer-sources {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.modal .answer-sources h4 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 8px;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 14px; }

/* ===== SPINNER ===== */
.spinner {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}
.spinner::after {
  content: '';
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .topbar { padding: 10px 14px; gap: 10px; }
  .stats-strip { display: none; }
  .search-area input { width: 160px; }
  .content { padding: 14px; }
  .topic-grid { grid-template-columns: 1fr; }
  .detail-panel { width: 100vw; }
  .nav-tab { padding: 10px 14px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    Knowledge Base
  </div>
  <div class="stats-strip" id="statsStrip">
    <span><span class="stat-val" id="statSources">—</span> sources</span>
    <span><span class="stat-val" id="statTopics">—</span> topics</span>
    <span><span class="stat-val" id="statChunks">—</span> chunks</span>
  </div>
  <div class="search-area">
    <input type="text" id="searchInput" placeholder="Search…" />
    <button class="btn btn-accent" id="askAiBtn" title="Ask AI">✦ Ask AI</button>
  </div>
</div>

<!-- Nav Tabs -->
<div class="nav-tabs">
  <div class="nav-tab active" data-view="topics">Topics</div>
  <div class="nav-tab" data-view="sources">Sources</div>
</div>

<!-- Main Content -->
<div class="content" id="mainContent"></div>

<!-- Detail Panel (slide-in) -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <h2 id="detailTitle">—</h2>
    <button class="detail-close" id="detailClose">✕</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- AI Answer Modal -->
<div class="modal-overlay" id="aiModal">
  <div class="modal">
    <h3>✦ AI Answer</h3>
    <div class="answer-text wiki-content" id="aiAnswer"></div>
    <div class="answer-sources" id="aiSources"></div>
    <div style="text-align:right;margin-top:16px">
      <button class="btn" id="aiModalClose">Close</button>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let currentView = 'topics';
let allTopics = [];
let allSources = [];
let searchQuery = '';

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  loadStats();
  loadTopics();
  loadSources();
  bindEvents();
});

// ===== API HELPERS =====
async function apiFetch(url, opts = {}) {
  try {
    const res = await fetch(url, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.detail || err.error || res.statusText);
    }
    return await res.json();
  } catch (e) {
    console.error(`API error: ${url}`, e);
    throw e;
  }
}

// ===== STATS =====
async function loadStats() {
  try {
    const s = await apiFetch('/stats');
    document.getElementById('statSources').textContent = s.total_sources;
    document.getElementById('statTopics').textContent = s.total_wiki_pages;
    document.getElementById('statChunks').textContent = s.total_chunks;
  } catch (e) {
    // silently degrade
  }
}

// ===== TOPICS =====
async function loadTopics() {
  try {
    allTopics = await apiFetch('/wiki');
  } catch (e) {
    allTopics = [];
  }
  if (currentView === 'topics') renderTopics();
}

function renderTopics() {
  const container = document.getElementById('mainContent');
  const filtered = searchQuery
    ? allTopics.filter(t => t.title.toLowerCase().includes(searchQuery.toLowerCase()))
    : allTopics;

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        <h3>${searchQuery ? 'No matching topics' : 'No topics yet'}</h3>
        <p>${searchQuery ? 'Try a different search' : 'Ingest some sources via Telegram to get started'}</p>
      </div>`;
    return;
  }

  container.innerHTML = '<div class="topic-grid">' + filtered.map(t => `
    <div class="topic-card" data-slug="${t.slug}">
      <h3>${escHtml(t.title)}</h3>
      <div class="topic-meta">
        <span>${t.source_count} source${t.source_count !== 1 ? 's' : ''}</span>
        ${t.stale ? '<span class="badge badge-stale">stale</span>' : ''}
        ${t.last_compiled_at ? '<span>' + formatDate(t.last_compiled_at) + '</span>' : ''}
      </div>
    </div>
  `).join('') + '</div>';

  container.querySelectorAll('.topic-card').forEach(card => {
    card.addEventListener('click', () => openTopic(card.dataset.slug));
  });
}

async function openTopic(slug) {
  const panel = document.getElementById('detailPanel');
  const body = document.getElementById('detailBody');
  document.getElementById('detailTitle').textContent = 'Loading…';
  body.innerHTML = '<div class="spinner"></div>';
  panel.classList.add('open');

  try {
    const page = await apiFetch(`/wiki/${encodeURIComponent(slug)}`);
    document.getElementById('detailTitle').textContent = page.title;
    
    let html = '<div class="wiki-content">' + marked.parse(page.content || '_No content compiled yet._') + '</div>';
    
    if (page.sources && page.sources.length > 0) {
      html += `
        <div class="detail-section" style="margin-top:24px">
          <div class="detail-section-title">Linked Sources (${page.sources.length})</div>
          <div class="linked-sources">
            ${page.sources.map(s => `
              <div class="linked-source">
                <div class="ls-title">${escHtml(s.title || 'Untitled')}</div>
                <div class="ls-meta">${s.url ? '<a href="' + escHtml(s.url) + '" target="_blank" style="color:var(--accent)">' + escHtml(s.url) + '</a>' : 'No URL'} · ${formatDate(s.ingested_at)}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }
    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${escHtml(e.message)}</p></div>`;
  }
}

// ===== SOURCES =====
let sourceTypeFilter = null;

async function loadSources() {
  try {
    allSources = await apiFetch('/sources?limit=500');
  } catch (e) {
    allSources = [];
  }
  if (currentView === 'sources') renderSources();
}

function renderSources() {
  const container = document.getElementById('mainContent');
  let filtered = allSources;

  if (sourceTypeFilter) {
    filtered = filtered.filter(s => s.source_type === sourceTypeFilter);
  }
  if (searchQuery) {
    filtered = filtered.filter(s => (s.title || '').toLowerCase().includes(searchQuery.toLowerCase()));
  }

  const types = ['article', 'youtube', 'tweet', 'quote'];
  let html = '<div class="filter-pills">';
  html += `<button class="pill ${!sourceTypeFilter ? 'active' : ''}" data-type="">All</button>`;
  types.forEach(t => {
    html += `<button class="pill ${sourceTypeFilter === t ? 'active' : ''}" data-type="${t}">${capitalize(t)}</button>`;
  });
  html += '</div>';

  if (filtered.length === 0) {
    html += `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        <h3>${searchQuery || sourceTypeFilter ? 'No matching sources' : 'No sources yet'}</h3>
        <p>${searchQuery || sourceTypeFilter ? 'Try adjusting your filters' : 'Ingest sources via Telegram using the kb: prefix'}</p>
      </div>`;
  } else {
    html += '<div class="source-list">';
    filtered.forEach(s => {
      html += `
        <div class="source-row" data-id="${s.id}">
          <span class="badge badge-${s.source_type || 'article'}">${s.source_type || '?'}</span>
          <span class="source-title">${escHtml(s.title || s.url || 'Untitled')}</span>
          <span class="source-date">${formatDate(s.ingested_at)}</span>
          <span class="enrichment-dot ${s.enrichment_status || 'pending'}" title="${s.enrichment_status || 'pending'}"></span>
        </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;

  // Pill clicks
  container.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      sourceTypeFilter = pill.dataset.type || null;
      renderSources();
    });
  });

  // Row clicks
  container.querySelectorAll('.source-row').forEach(row => {
    row.addEventListener('click', () => openSource(row.dataset.id));
  });
}

async function openSource(id) {
  const panel = document.getElementById('detailPanel');
  const body = document.getElementById('detailBody');
  document.getElementById('detailTitle').textContent = 'Loading…';
  body.innerHTML = '<div class="spinner"></div>';
  panel.classList.add('open');

  try {
    const [source, pipeline] = await Promise.all([
      apiFetch(`/sources/${id}`),
      apiFetch(`/sources/${id}/pipeline`).catch(() => [])
    ]);

    document.getElementById('detailTitle').textContent = source.title || 'Untitled';

    let html = '';

    // Type + URL
    html += `<div style="margin-bottom:16px">
      <span class="badge badge-${source.source_type || 'article'}">${source.source_type || '?'}</span>
      ${source.url ? ' <a href="' + escHtml(source.url) + '" target="_blank" style="color:var(--accent);font-size:13px;margin-left:8px">' + escHtml(source.url) + '</a>' : ''}
      <span style="color:var(--text-muted);font-size:12px;margin-left:8px">${formatDate(source.ingested_at)}</span>
    </div>`;

    // Summary
    if (source.summary) {
      html += `<div class="detail-section">
        <div class="detail-section-title">Summary</div>
        <p>${escHtml(source.summary)}</p>
      </div>`;
    }

    // Key Insights
    if (source.key_insights) {
      const insights = typeof source.key_insights === 'string'
        ? source.key_insights.split('\n').filter(Boolean)
        : (Array.isArray(source.key_insights) ? source.key_insights : []);
      if (insights.length) {
        html += `<div class="detail-section">
          <div class="detail-section-title">Key Insights</div>
          <ul class="insight-list">${insights.map(i => `<li>${escHtml(i.replace(/^[-•]\s*/, ''))}</li>`).join('')}</ul>
        </div>`;
      }
    }

    // Entities
    if (source.entities && source.entities.length) {
      html += `<div class="detail-section">
        <div class="detail-section-title">Entities</div>
        <div class="entity-tags">${source.entities.map(e => `<span class="entity-tag">${escHtml(e.name)} <span style="opacity:0.5">${escHtml(e.type)}</span></span>`).join('')}</div>
      </div>`;
    }

    // Topics
    if (source.topics) {
      const topics = typeof source.topics === 'string'
        ? source.topics.split(',').map(t => t.trim()).filter(Boolean)
        : (Array.isArray(source.topics) ? source.topics : []);
      if (topics.length) {
        html += `<div class="detail-section">
          <div class="detail-section-title">Topics</div>
          <div class="entity-tags">${topics.map(t => `<span class="entity-tag" style="cursor:pointer;border-color:var(--accent);color:var(--accent)" onclick="closePanel();setTimeout(()=>{switchView('topics');document.getElementById('searchInput').value='${escHtml(t)}';searchQuery='${escHtml(t)}';renderTopics()},100)">${escHtml(t)}</span>`).join('')}</div>
        </div>`;
      }
    }

    // Pipeline
    if (pipeline && pipeline.length) {
      html += `<div class="detail-section">
        <div class="detail-section-title">Enrichment Pipeline</div>
        <div class="pipeline">${pipeline.map(p => `
          <div class="pipeline-stage">
            <span class="stage-name">${escHtml(p.stage)}</span>
            <span class="stage-status ${p.status}">${p.status}</span>
            ${p.error ? '<span style="color:var(--red);font-size:11px;margin-left:8px">' + escHtml(p.error).substring(0, 80) + '</span>' : ''}
          </div>
        `).join('')}</div>
      </div>`;
    }

    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${escHtml(e.message)}</p></div>`;
  }
}

// ===== SEARCH & AI =====
async function askAI(query) {
  const modal = document.getElementById('aiModal');
  const answerEl = document.getElementById('aiAnswer');
  const sourcesEl = document.getElementById('aiSources');
  answerEl.innerHTML = '<div class="spinner"></div>';
  sourcesEl.innerHTML = '';
  modal.classList.add('open');

  try {
    const result = await apiFetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    answerEl.innerHTML = marked.parse(result.answer || 'No answer generated.');
    if (result.sources && result.sources.length) {
      sourcesEl.innerHTML = `<h4>Sources</h4>` + result.sources.map(s =>
        `<div style="font-size:13px;margin-bottom:4px">• ${escHtml(s.title || 'Untitled')}${s.url ? ' — <a href="' + escHtml(s.url) + '" target="_blank" style="color:var(--accent)">' + escHtml(s.url) + '</a>' : ''}</div>`
      ).join('');
    }
  } catch (e) {
    answerEl.innerHTML = `<p style="color:var(--red)">Error: ${escHtml(e.message)}</p>`;
  }
}

// ===== EVENTS =====
function bindEvents() {
  // Tab switching
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => switchView(tab.dataset.view));
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    if (currentView === 'topics') renderTopics();
    else renderSources();
  });

  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      searchQuery = e.target.value;
      if (currentView === 'topics') renderTopics();
      else renderSources();
    }
  });

  // Ask AI
  document.getElementById('askAiBtn').addEventListener('click', () => {
    const q = document.getElementById('searchInput').value.trim();
    if (q) askAI(q);
  });

  // Close detail panel
  document.getElementById('detailClose').addEventListener('click', closePanel);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closePanel();
      document.getElementById('aiModal').classList.remove('open');
    }
  });

  // Close AI modal
  document.getElementById('aiModalClose').addEventListener('click', () => {
    document.getElementById('aiModal').classList.remove('open');
  });
  document.getElementById('aiModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  if (view === 'topics') renderTopics();
  else renderSources();
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
}

// ===== UTILS =====
function escHtml(str) {
  if (!str) return '';
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const diffH = diffMs / 3600000;
    if (diffH < 1) return Math.round(diffMs / 60000) + 'm ago';
    if (diffH < 24) return Math.round(diffH) + 'h ago';
    if (diffH < 168) return Math.round(diffH / 24) + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch { return iso; }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
